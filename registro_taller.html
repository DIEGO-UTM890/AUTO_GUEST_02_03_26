<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Taller - AutoGuest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

    <div class="form-page-wrapper">
        <div class="form-image-column">
            <div class="logo-link">
                <a href="home.html">
                    <img src="imagenes/Logo_Autoguest.png" alt="Logo de AutoGuest">
                </a>
            </div>
            <div class="image-text">
                <h2>Conecta con más conductores que nunca.</h2>
                <p>Digitaliza tu negocio, gestiona tus citas y haz crecer tu taller con nuestra plataforma.</p>
            </div>
        </div>

        <div class="form-content-column">
            <div class="form-container">
                <h1>Registra tu Taller</h1>
                <p>Únete a nuestra red y digitaliza tus servicios.</p>

                <form id="registroForm">
                    <div class="form-group">
                        <label for="admin-name">Nombre del Encargado / Administrador</label>
                        <input type="text" id="admin-name" class="form-control" placeholder="Ej: Juan Pérez" required
                            pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$" title="El nombre solo debe contener letras y espacios">
                    </div>

                    <div class="form-group">
                        <label for="workshop-name">Nombre del Taller</label>
                        <input type="text" id="workshop-name" class="form-control" placeholder="Ej: Mecánica Express"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="address">Dirección del Taller</label>
                        <input type="text" id="address" class="form-control"
                            placeholder="Calle, número, colonia, ciudad" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email de Contacto</label>
                        <input type="email" id="email" class="form-control" placeholder="contacto@taller.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Teléfono</label>
                        <input type="tel" id="phone" class="form-control" placeholder="Ej: 5551234567" required
                            maxlength="10" pattern="\d{10}"
                            title="El teléfono debe tener exactamente 10 dígitos numéricos">
                    </div>

                    <div class="form-group">
                        <label for="password">Crear Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres"
                            required>
                    </div>

                    <button type="submit" class="btn">Solicitar Registro</button>
                </form>

                <!-- Flujo de Google al final -->
                <div class="google-auth-bottom">
                    <div class="or-separator">O regístrate con</div>
                    <div id="google_btn_official"></div>
                </div>

                <div class="extra-link">
                    <p>¿Ya eres socio? <a href="login_taller.html">Inicia Sesión</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            // 2. CAPTURAR EL NUEVO CAMPO
            const nombreAdmin = document.getElementById('admin-name').value; // <--- NUEVO
            const nombreTaller = document.getElementById('workshop-name').value;
            const direccion = document.getElementById('address').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const telefono = document.getElementById('phone').value;

            // --- VALIDACIONES FRONTEND ---
            const nombreRegex = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;
            if (!nombreRegex.test(nombreAdmin)) {
                alert('El nombre del administrador solo puede contener letras y espacios.');
                return;
            }

            const telefonoRegex = /^\d{10}$/;
            if (!telefonoRegex.test(telefono)) {
                alert('El teléfono debe tener exactamente 10 dígitos numéricos.');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Por favor, ingresa un correo electrónico válido.');
                return;
            }
            // -----------------------------

            try {
                const response = await fetch('/api/registro/taller', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // 3. ENVIARLO AL BACKEND
                    body: JSON.stringify({
                        nombreAdmin, // <--- AQUI SE ENVÍA EL NOMBRE DE LA PERSONA
                        nombreTaller, // <--- AQUI EL DEL NEGOCIO
                        direccion,
                        email,
                        password,
                        telefono
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('¡Taller registrado exitosamente! Ahora puedes iniciar sesión.');
                    window.location.href = 'login_taller.html';
                } else {
                    alert('Error: ' + data.mensaje);
                }

            } catch (error) {
                console.error('Error:', error);
                alert('No se pudo conectar con el servidor.');
            }
        });

        // Google Authentication Logic
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "677789842914-bvfkfbvojts8ajcs975crbhj51pl1utl.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });

            // Renderizado oficial del botón
            google.accounts.id.renderButton(
                document.getElementById("google_btn_official"),
                {
                    theme: "outline",
                    size: "large",
                    width: document.querySelector('.form-container').offsetWidth - 100,
                    text: "signup_with",
                    shape: "rectangular"
                }
            );
        };

        async function handleCredentialResponse(response) {
            console.log("Google Data:", response);
            try {
                const res = await fetch('/api/registro/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: response.credential,
                        role: 'taller'
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('¡Registro con Google exitoso!');
                    window.location.href = data.redirectTo || 'portal_taller.html';
                } else {
                    console.error('Backend Error:', data);
                    alert('Error del servidor: ' + (data.mensaje || 'Error desconocido'));
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                alert('Error de conexión: No se pudo conectar con el servidor backend.');
            }
        }
    </script>
    <script src="/js/global_nav.js"></script>
</body>

</html>
